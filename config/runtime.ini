# WNMP Runtime 配置文件
# 此文件是 Panel/运行器主配置，用于控制面板行为、启动开关等
#
# 重要：组件端口说明
#   HTTP_PORT / HTTPS_PORT / PHP_CGI_PORT / MYSQL_PORT 仅作为首次初始化模板的默认值
#   初始化完成后，真实端口以生成后的配置文件为准：
#     - Nginx HTTP/HTTPS 端口：config/nginx.conf 和 config/nginx/site.conf 中的 listen 指令
#     - PHP-CGI 监听地址/端口：config/php/php-cgi.ini 中的 [php-cgi] host/port
#     - MySQL 端口：config/mysql/my.ini 中的 [mysqld] port
#   用户修改配置文件后，Panel 状态检测和启动命令将使用配置文件中的端口
#   修改本文件的端口值不会覆盖已生成的配置文件

# HTTP 端口（仅作为首次生成 nginx 配置的默认值，初始化后以 nginx 配置文件为准）
HTTP_PORT=80

# HTTPS 端口（仅作为首次生成 nginx 配置的默认值，初始化后以 nginx 配置文件为准）
HTTPS_PORT=443

# PHP-CGI 监听地址（仅作为首次生成 php-cgi.ini 的默认值，初始化后以 php-cgi.ini 为准）
PHP_CGI_HOST=127.0.0.1
# PHP-CGI 监听端口（仅作为首次生成 php-cgi.ini 的默认值，初始化后以 php-cgi.ini 为准）
PHP_CGI_PORT=9000

# MySQL 监听地址
MYSQL_HOST=127.0.0.1
# MySQL 端口（仅作为首次生成 my.ini 的默认值，初始化后以 my.ini 为准）
MYSQL_PORT=3306

# 站点根目录（支持相对路径）
WEB_ROOT=./www

# MySQL 数据目录
MYSQL_DATA_DIR=./data/mysql

# 启动后是否自动打开浏览器（1=是，0=否）
AUTO_OPEN_BROWSER=1

# 是否自动生成本地自签名证书（1=是，0=否，启用 HTTPS 前预生成证书）
AUTO_GENERATE_CERT=1

# 是否启用 HTTPS（1=是，0=否）
ENABLE_HTTPS=1

# 是否启用开机自启动（1=是，0=否，由自启动脚本自动更新）
AUTO_START=0

# 启动超时（秒）
START_TIMEOUT=60

# MySQL 启动端口等待超时（秒），首次初始化建议 90，普通启动可用 60
MYSQL_START_TIMEOUT=90

# 停止超时（秒）
STOP_TIMEOUT=30

# Windows 计划任务服务名
SERVICE_NAME=WNMPRuntime
SERVICE_DISPLAY_NAME=WNMP Runtime Service

# 是否将工具目录加入系统 PATH（1=是，0=否，首次初始化时生效）
ADD_TO_SYSTEM_PATH=1

# 是否将 OpenSSL 加入系统 PATH（1=是，0=否，仅在 ADD_TO_SYSTEM_PATH=1 时有效）
ADD_OPENSSL_TO_SYSTEM_PATH=0

# Panel 服务监听地址（默认只监听本机 127.0.0.1，不开放公网）
PANEL_HOST=127.0.0.1

# Panel 服务监听端口（默认 8787）
PANEL_PORT=8787

# 关闭所有 Panel 网页后是否自动退出 Panel Server（1=是，0=否）
PANEL_EXIT_ON_CLOSE=1

# 前端心跳间隔（秒）
PANEL_HEARTBEAT_INTERVAL=5

# 无活跃页面多久后退出 Panel Server（秒）
PANEL_NO_CLIENT_EXIT_SECONDS=60

# 心跳失联清理超时（秒）
# 浏览器后台标签页可能限速心跳，因此心跳失联清理时间不能太短
# 实际 stale_timeout = max(PANEL_CLIENT_STALE_SECONDS, PANEL_HEARTBEAT_INTERVAL*12, 120)
PANEL_CLIENT_STALE_SECONDS=300

# Panel Server 退出前宽限时间（秒）
PANEL_SHUTDOWN_GRACE_SECONDS=2

# 版本信息缓存秒数
PANEL_VERSION_CACHE_TTL=600

# [已废弃] 自动进程收养开关
# 当前状态探测已改为端口+进程路径独立检测，不再依赖 PID 文件作为唯一状态依据
# 端口开放时通过进程路径判断归属，PID 缺失不影响状态判断
# 保留此配置项仅为向后兼容，实际不再使用
PANEL_STATUS_ADOPT_PROCESS=0
